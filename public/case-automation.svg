<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0A0A0A"/>
  
  <defs>
    <filter id="blurFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
    </filter>
    
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3131;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#FF3131;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3131;stop-opacity:0" />
    </linearGradient>

    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF3131;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF3131;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Animated Particles (Representative) -->
  <g opacity="0.4">
    <circle cx="200" cy="150" r="1.5" fill="white"/>
    <circle cx="350" cy="180" r="2" fill="#FF3131"/>
    <circle cx="500" cy="140" r="1.5" fill="white"/>
    <circle cx="650" cy="160" r="2" fill="#FF3131"/>
    <circle cx="150" cy="300" r="2" fill="#FF3131"/>
    <circle cx="400" cy="320" r="1.5" fill="white"/>
    <circle cx="550" cy="280" r="2" fill="#FF3131"/>
  </g>

  <!-- Kinetic Flow Paths -->
  <path d="M50 225 C 200 100, 600 350, 750 225" stroke="url(#flowGrad)" stroke-width="2" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="5s" repeatCount="indefinite" />
  </path>
  <path d="M50 225 C 200 350, 600 100, 750 225" stroke="white" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Core Hub Nodes -->
  <g transform="translate(400, 225)">
    <!-- Main Node Glow -->
    <circle r="40" fill="#FF3131" fill-opacity="0.1" filter="url(#blurFilter)"/>
    <circle r="30" stroke="#FF3131" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle r="15" fill="#FF3131"/>
    
    <!-- Outer Rings -->
    <circle r="60" stroke="white" stroke-width="0.5" stroke-opacity="0.1" stroke-dasharray="2 4"/>
    <circle r="80" stroke="white" stroke-width="0.5" stroke-opacity="0.05"/>
  </g>

  <!-- Floating Logic Symbols -->
  <g opacity="0.3">
    <rect x="180" y="210" width="30" height="30" rx="4" stroke="white" stroke-width="1"/>
    <path d="M190 225 H200" stroke="white" stroke-width="1"/>
    
    <rect x="590" y="210" width="30" height="30" rx="4" stroke="#FF3131" stroke-width="1"/>
    <path d="M600 220 L600 230 L610 225 Z" fill="#FF3131"/>
  </g>

  <text x="400" y="420" text-anchor="middle" fill="white" fill-opacity="0.2" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="8">HYPER-AUTOMATION CORE</text>
</svg>
