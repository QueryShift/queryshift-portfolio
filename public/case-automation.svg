<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0A0A0A"/>
  <defs>
    <linearGradient id="grad2" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#FF3131;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Flow Lines -->
  <path d="M100 225 H700" stroke="url(#grad2)" stroke-width="1" stroke-dasharray="20 10"/>
  <path d="M100 150 H700" stroke="url(#grad2)" stroke-width="0.5" stroke-opacity="0.3"/>
  <path d="M100 300 H700" stroke="url(#grad2)" stroke-width="0.5" stroke-opacity="0.3"/>
  
  <!-- Processing Nodes -->
  <circle cx="200" cy="225" r="30" stroke="#FF3131" stroke-width="1"/>
  <circle cx="200" cy="225" r="5" fill="#FF3131">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <rect x="365" y="200" width="70" height="50" rx="2" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="375" y="210" width="50" height="30" rx="1" fill="#FF3131" fill-opacity="0.1"/>
  
  <circle cx="600" cy="225" r="30" stroke="#FF3131" stroke-width="1"/>
  <path d="M590 225 L600 235 L615 215" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Connections -->
  <path d="M230 225 L365 225" stroke="#FF3131" stroke-opacity="0.5" stroke-width="1"/>
  <path d="M435 225 L570 225" stroke="#FF3131" stroke-opacity="0.5" stroke-width="1"/>
  
  <text x="400" y="400" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.3" font-family="Arial" font-size="12" letter-spacing="4">RPA WORKFLOW ENGINE</text>
</svg>
